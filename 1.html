<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Online Voting System</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --primary-hover: #2b52a2;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #e2e8f0;
            --success-color: #48bb78;
            --danger-color: #e53e3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
        }

        .nav-buttons button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .nav-buttons button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger-color);
        }
        .btn-danger:hover {
            background-color: #b91c1c;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* Voting Ballot Styling */
        .ballot-post {
            margin-bottom: 2.5rem;
            background: #fcfcfc;
            padding: 1.5rem;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
        }

        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .candidate-card {
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .candidate-card:hover {
            border-color: var(--primary-color);
            background: #f0f7ff;
        }

        .candidate-card input[type="radio"] {
            display: none;
        }

        .candidate-card.selected {
            border-color: var(--success-color);
            background-color: #f0fff4;
        }

        .candidate-card .check-icon {
            display: none;
            color: var(--success-color);
            font-size: 1.5rem;
            position: absolute;
            top: 5px;
            right: 10px;
        }

        .candidate-card.selected .check-icon {
            display: block;
        }

        /* Confirmation Page */
        .confirmation-view {
            text-align: center;
            padding: 3rem 1rem;
        }

        .success-checkmark {
            font-size: 5rem;
            color: var(--success-color);
            margin-bottom: 1rem;
        }

        /* Admin UI Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }

        th, td {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        th {
            background-color: #edf2f7;
        }

        .results-bar-container {
            background: #edf2f7;
            border-radius: 4px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            margin-top: 0.25rem;
        }

        .results-bar {
            height: 100%;
            background-color: var(--success-color);
            width: 0%;
            transition: width 0.5s ease;
        }

        .admin-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .alert-danger {
            background-color: #fed7d7;
            color: #9b2c2c;
            border: 1px solid #feb2b2;
        }
    </style>
</head>
<body>

    <header>
        <h1>🗳️ School Online Voting System</h1>
        <div class="nav-buttons">
            <button onclick="switchView('voter-login-view')">Student Voting</button>
            <button onclick="promptAdminPassword()">Admin Panel</button>
        </div>
    </header>

    <div class="container">

        <!-- 1. STUDENT LOGIN VIEW -->
        <div id="voter-login-view" class="view-section active">
            <div class="card">
                <h2>Student Voter Verification</h2>
                <div id="login-error" class="alert alert-danger" style="display:none;"></div>
                <form id="voter-login-form" onsubmit="handleVoterLogin(event)">
                    <div class="form-group">
                        <label for="student-name">Full Name</label>
                        <input type="text" id="student-name" required placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="student-class">Class/Grade</label>
                        <select id="student-class" required>
                            <option value="">Select Class</option>
                            <option value="Class 6">Class 6</option>
                            <option value="Class 7">Class 7</option>
                            <option value="Class 8">Class 8</option>
                            <option value="Class 9">Class 9</option>
                            <option value="Class 10">Class 10</option>
                            <option value="Class 11">Class 11</option>
                            <option value="Class 12">Class 12</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="student-section">Section</label>
                        <input type="text" id="student-section" required placeholder="e.g. A, B, C">
                    </div>
                    <button type="submit" class="btn">Proceed to Ballot</button>
                </form>
            </div>
        </div>

        <!-- 2. VOTING BALLOT VIEW -->
        <div id="ballot-view" class="view-section">
            <div class="card">
                <h2>Cast Your Vote</h2>
                <p id="voter-badge" style="font-weight: bold; margin-bottom: 1.5rem; color: #4a5568;"></p>
                <form id="ballot-form" onsubmit="submitVotes(event)">
                    <div id="ballot-posts-container">
                        <!-- Dynamic ballot options load here -->
                    </div>
                    <button type="submit" class="btn btn-success">Submit Ballot</button>
                </form>
            </div>
        </div>

        <!-- 3. CONFIRMATION VIEW -->
        <div id="confirmation-view" class="view-section">
            <div class="card confirmation-view">
                <div class="success-checkmark">✓</div>
                <h2>Thank you! Your vote has been recorded.</h2>
                <p>The system is preparing for the next voter in <span id="countdown">4</span> seconds...</p>
            </div>
        </div>

        <!-- 4. ADMIN PANEL VIEW -->
        <div id="admin-view" class="view-section">
            <div class="card">
                <h2>Admin Control Panel</h2>
                
                <div class="admin-controls">
                    <button class="btn" onclick="toggleVotingStatus()" id="toggle-status-btn">Stop Voting Process</button>
                    <button class="btn btn-danger" onclick="resetSystem()">Reset System (Clear All Data)</button>
                </div>

                <h3>Live Vote Tallies</h3>
                <div id="admin-live-results">
                    <!-- Live calculations will render here -->
                </div>

                <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-color);">

                <h3>Manage Election Structure</h3>
                <form id="add-candidate-form" onsubmit="addCandidate(event)" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label for="new-post">Election Post Name</label>
                        <input type="text" id="new-post" required placeholder="e.g. School Captain, Vice President">
                    </div>
                    <div class="form-group">
                        <label for="new-candidate">Candidate Name</label>
                        <input type="text" id="new-candidate" required placeholder="Enter candidate's full name">
                    </div>
                    <button type="submit" class="btn">Add Candidate</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        // --- DATA PERSISTENCE & DEFAULTS ---
        // Initialize localStorage variables to simulate database features
        let postsData = JSON.parse(localStorage.getItem('postsData')) || {
            "School Head Boy/Girl": ["Rahul Sharma", "Ananya Verma", "Pranav Nair"],
            "Sports Captain": ["Aditya Sen", "Meera Joshi"]
        };

        let votes = JSON.parse(localStorage.getItem('votes')) || [];
        let registeredVoters = JSON.parse(localStorage.getItem('registeredVoters')) || [];
        let isVotingOpen = JSON.parse(localStorage.getItem('isVotingOpen')) !== false;

        let currentVoter = null;

        // --- APP VIEW CONTROLLER ---
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
            
            if (viewId === 'admin-view') {
                renderAdminDashboard();
            } else if (viewId === 'ballot-view') {
                renderBallot();
            }
        }

        // --- VOTER MANAGEMENT ---
        function handleVoterLogin(e) {
            e.preventDefault();
            
            if (!isVotingOpen) {
                alert("Voting is currently closed by the administrator.");
                return;
            }

            const name = document.getElementById('student-name').value.trim();
            const grade = document.getElementById('student-class').value;
            const section = document.getElementById('student-section').value.trim().toUpperCase();
            
            const voterID = `${name}_${grade}_${section}`.toLowerCase();

            // Verify if voter already cast their vote
            if (registeredVoters.includes(voterID)) {
                const errorDiv = document.getElementById('login-error');
                errorDiv.innerText = "Access Denied: A vote has already been submitted using these details.";
                errorDiv.style.display = "block";
                return;
            }

            document.getElementById('login-error').style.display = "none";
            currentVoter = { id: voterID, name, grade, section };
            switchView('ballot-view');
        }

        // --- BALLOT RENDERING & SUBMIT ---
        function renderBallot() {
            document.getElementById('voter-badge').innerText = `Voter: ${currentVoter.name} (${currentVoter.grade} - ${currentVoter.section})`;
            const container = document.getElementById('ballot-posts-container');
            container.innerHTML = '';

            Object.keys(postsData).forEach((post, index) => {
                const postSection = document.createElement('div');
                postSection.className = 'ballot-post';
                postSection.innerHTML = `<h3>${post}</h3>`;

                const grid = document.createElement('div');
                grid.className = 'candidates-grid';

                postsData[post].forEach(candidate => {
                    const card = document.createElement('label');
                    card.className = 'candidate-card';
                    card.innerHTML = `
                        <input type="radio" name="post_${index}" value="${candidate}" required onchange="highlightSelection(this, 'post_${index}')">
                        <span class="check-icon">✓</span>
                        <div style="font-weight: bold; font-size: 1.1rem;">${candidate}</div>
                    `;
                    grid.appendChild(card);
                });

                postSection.appendChild(grid);
                container.appendChild(postSection);
            });
        }

        function highlightSelection(radio, name) {
            // Unhighlight all options in this group, then highlight selected one
            const radiogroup = document.getElementsByName(name);
            radiogroup.forEach(el => {
                el.parentElement.classList.remove('selected');
            });
            if (radio.checked) {
                radio.parentElement.classList.add('selected');
            }
        }

        function submitVotes(e) {
            e.preventDefault();
            
            const selectedVotes = {};
            let allVoted = true;

            Object.keys(postsData).forEach((post, index) => {
                const checkedOption = document.querySelector(`input[name="post_${index}"]:checked`);
                if (checkedOption) {
                    selectedVotes[post] = checkedOption.value;
                } else {
                    allVoted = false;
                }
            });

            if (!allVoted) {
                alert("Please select a candidate for each post.");
                return;
            }

            // Save vote and register voter
            votes.push(selectedVotes);
            registeredVoters.push(currentVoter.id);
            localStorage.setItem('votes', JSON.stringify(votes));
            localStorage.setItem('registeredVoters', JSON.stringify(registeredVoters));

            // Show Confirmation Page and Auto-refresh cycle
            switchView('confirmation-view');
            document.getElementById('voter-login-form').reset();
            currentVoter = null;

            let timeRemaining = 4;
            const timerSpan = document.getElementById('countdown');
            timerSpan.innerText = timeRemaining;

            const countdownInterval = setInterval(() => {
                timeRemaining--;
                timerSpan.innerText = timeRemaining;
                if (timeRemaining <= 0) {
                    clearInterval(countdownInterval);
                    switchView('voter-login-view');
                }
            }, 1000);
        }

        // --- ADMIN SYSTEM MANAGEMENT ---
        function promptAdminPassword() {
            const password = prompt("Enter Administration Password to view reports & modify settings:");
            // For simple offline demonstration, fallback password is "admin123"
            if (password === "admin123") {
                switchView('admin-view');
            } else if (password !== null) {
                alert("Incorrect password.");
            }
        }

        function toggleVotingStatus() {
            isVotingOpen = !isVotingOpen;
            localStorage.setItem('isVotingOpen', isVotingOpen);
            alert(`Voting has been successfully ${isVotingOpen ? 'Opened' : 'Closed'}.`);
            renderAdminDashboard();
        }

        function addCandidate(e) {
            e.preventDefault();
            const post = document.getElementById('new-post').value.trim();
            const candidate = document.getElementById('new-candidate').value.trim();

            if (!postsData[post]) {
                postsData[post] = [];
            }

            if (postsData[post].includes(candidate)) {
                alert("This candidate is already added to this post.");
                return;
            }

            postsData[post].push(candidate);
            localStorage.setItem('postsData', JSON.stringify(postsData));
            
            document.getElementById('new-candidate').value = '';
            alert(`Successfully added ${candidate} to ${post}`);
            renderAdminDashboard();
        }

        function renderAdminDashboard() {
            const statusBtn = document.getElementById('toggle-status-btn');
            statusBtn.innerText = isVotingOpen ? "Stop Voting Process" : "Start Voting Process";
            statusBtn.className = isVotingOpen ? "btn btn-danger" : "btn";

            const container = document.getElementById('admin-live-results');
            container.innerHTML = `<p style="margin-bottom: 1rem;">Total Ballots Submitted: <strong>${votes.length}</strong></p>`;

            Object.keys(postsData).forEach(post => {
                const resultsTable = document.createElement('div');
                resultsTable.style.marginBottom = "2rem";
                resultsTable.innerHTML = `<h4>Post: ${post}</h4>`;

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th style="width: 40%;">Candidate</th>
                            <th style="width: 20%;">Votes</th>
                            <th style="width: 40%;">Share Status</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;

                const tbody = table.querySelector('tbody');

                // Tally occurrences
                const tallies = {};
                postsData[post].forEach(c => tallies[c] = 0);
                
                votes.forEach(vote => {
                    if (vote[post]) {
                        tallies[vote[post]] = (tallies[vote[post]] || 0) + 1;
                    }
                });

                // Calculate total votes cast for this specific post
                const totalPostVotes = Object.values(tallies).reduce((sum, val) => sum + val, 0);

                postsData[post].forEach(candidate => {
                    const candidateVotes = tallies[candidate] || 0;
                    const percentage = totalPostVotes > 0 ? ((candidateVotes / totalPostVotes) * 100).toFixed(1) : 0;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${candidate}</strong></td>
                        <td>${candidateVotes} votes</td>
                        <td>
                            <div>${percentage}%</div>
                            <div class="results-bar-container">
                                <div class="results-bar" style="width: ${percentage}%"></div>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                resultsTable.appendChild(table);
                container.appendChild(resultsTable);
            });
        }

        function resetSystem() {
            if (confirm("WARNING: This action deletes all candidate lists, voter registers, and vote tallies permanently. Proceed?")) {
                localStorage.clear();
                postsData = {
                    "School Head Boy/Girl": ["Rahul Sharma", "Ananya Verma", "Pranav Nair"],
                    "Sports Captain": ["Aditya Sen", "Meera Joshi"]
                };
                votes = [];
                registeredVoters = [];
                isVotingOpen = true;
                
                localStorage.setItem('postsData', JSON.stringify(postsData));
                alert("System has been restored to basic default structure.");
                renderAdminDashboard();
            }
        }
    </script>
</body>
</html>
